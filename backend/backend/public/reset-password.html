<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <img src="img/logo.png" alt="شعار الموقع" class="site-logo">
    <div class="eyebrow">لمّة</div>
    <h1>تعيين كلمة مرور جديدة</h1>
    <div class="dev-credit">تطوير فيصل الجهني</div>
  </div>
  <div class="dossier">
    <form id="form-reset">
      <label>كلمة المرور الجديدة</label>
      <input type="password" id="new-password" minlength="8" required>
      <button type="submit" class="btn-primary">تحديث كلمة المرور</button>
    </form>
    <div id="msg"></div>
  </div>

  <footer class="site-footer">
    <p>برمجة وتطوير: <strong>Faisal ALjuhani</strong></p>
    <a href="https://instagram.com/f99oi_" target="_blank" rel="noopener noreferrer" class="footer-ig">
      📸 تواصل عبر انستقرام
      <span>@f99oi_</span>
    </a>
  </footer>

</div>
<script>
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  const msg = document.getElementById('msg');

  if (!token) {
    msg.innerHTML = '<div class="error-box">رابط غير صحيح.</div>';
  }

  document.getElementById('form-reset').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('new-password').value;
    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'حدث خطأ');
      msg.innerHTML = '<div class="success-box">' + data.message + ' — تقدر ترجع تسجل دخولك الحين.</div>';
      document.getElementById('form-reset').classList.add('hidden');
    } catch (err) {
      msg.innerHTML = '<div class="error-box">' + err.message + '</div>';
    }
  });
</script>
</body>
</html>
