<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>لوحة تحكم المشرف - لمّة</title>
<link rel="icon" href="img/logo.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #14110F;
  --panel: #1F1B17;
  --panel-2: #292320;
  --line: #3A322B;
  --amber: #E8A33D;
  --red: #C1443C;
  --green: #6B8F5C;
  --cream: #EDE6DA;
  --muted: #948C7E;
  --radius: 4px;
}
* { box-sizing: border-box; }
body {
  margin: 0; min-height: 100vh;
  background: radial-gradient(ellipse at 50% -10%, rgba(232,163,61,0.08), transparent 60%), var(--bg);
  color: var(--cream); font-family: 'Cairo', sans-serif; direction: rtl;
}
.wrap { max-width: 920px; margin: 0 auto; padding: 28px 18px 80px; }
h1 { font-size: 24px; font-weight: 800; margin: 0; }
h2 { font-size: 17px; font-weight: 700; margin: 0 0 12px; color: var(--amber); }
.topbar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--line); padding-bottom: 16px; margin-bottom: 20px; }
.topbar .eyebrow { font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; color: var(--amber); font-size: 11px; text-transform: uppercase; }
button {
  font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
  border-radius: var(--radius); border: 1px solid var(--line); padding: 10px 16px;
  background: var(--panel-2); color: var(--cream);
}
button:hover { border-color: var(--amber); }
.btn-primary { background: var(--amber); color: #1a1512; border-color: var(--amber); }
.btn-primary:hover { opacity: .9; }
.btn-danger { background: transparent; color: var(--red); border-color: var(--red); }
.btn-danger:hover { background: rgba(193,68,60,0.12); }
.btn-sm { padding: 6px 10px; font-size: 12px; }
input, select, textarea {
  width: 100%; background: var(--panel-2); border: 1px solid var(--line); color: var(--cream);
  padding: 10px 12px; border-radius: var(--radius); font-family: inherit; font-size: 14px; margin-bottom: 10px;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--amber); }
label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; margin-bottom: 16px; }
.hidden { display: none !important; }
.error-box { background: rgba(193,68,60,0.15); border: 1px solid var(--red); color: #f2b3ae; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-top: 10px; }
.success-box { background: rgba(107,143,92,0.15); border: 1px solid var(--green); color: #cfe0c7; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-top: 10px; }
.tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.tabs button { flex: 1; min-width: 130px; background: var(--panel-2); color: var(--muted); }
.tabs button.active { background: var(--amber); color: #1a1512; border-color: var(--amber); }
.row { display: flex; gap: 10px; align-items: center; }
.row > * { margin-bottom: 0; }
.list-item { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 8px; background: var(--panel-2); }
.list-item .grow { flex: 1; }
.list-item .meta { font-size: 12px; color: var(--muted); }
.chip { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: rgba(232,163,61,0.15); color: var(--amber); margin-inline-start: 6px; }
.word-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--panel); border: 1px solid var(--line); padding: 4px 8px; border-radius: 20px; font-size: 13px; margin: 3px; }
.word-chip button { padding: 0 4px; border: none; background: none; color: var(--red); font-size: 14px; line-height: 1; }
.words-wrap { display: flex; flex-wrap: wrap; margin-top: 8px; }
.cat-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.cat-header .arrow { color: var(--muted); transition: transform .15s; }
.cat-body { display: none; margin-top: 12px; border-top: 1px dashed var(--line); padding-top: 12px; }
.cat-body.open { display: block; }
.q-item { border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; background: var(--panel-2); }
.q-item .q-items { color: var(--cream); font-weight: 600; }
.q-item .q-choices { color: var(--muted); font-size: 13px; margin-top: 4px; }
.q-item .q-answer { color: var(--green); font-size: 13px; margin-top: 2px; }
.q-item .q-actions { display: flex; gap: 8px; margin-top: 10px; }
.center { text-align: center; }
.muted { color: var(--muted); font-size: 13px; }
#loginView { max-width: 380px; margin: 80px auto; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== شاشة تسجيل الدخول ===== -->
  <div id="loginView">
    <div class="topbar" style="border:none; justify-content:center; margin-bottom:24px;">
      <div class="center">
        <div class="eyebrow">ADMIN ACCESS</div>
        <h1>لوحة تحكم المشرف</h1>
      </div>
    </div>
    <div class="card">
      <form id="loginForm">
        <label>اسم المستخدم</label>
        <input type="text" id="loginUsername" autocomplete="username" required>
        <label>كلمة المرور</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
        <button type="submit" class="btn-primary" style="width:100%;">دخول</button>
      </form>
      <div id="loginMsg"></div>
    </div>
  </div>

  <!-- ===== لوحة التحكم ===== -->
  <div id="dashView" class="hidden">
    <div class="topbar">
      <div>
        <div class="eyebrow">ADMIN PANEL</div>
        <h1>لوحة تحكم المشرف</h1>
      </div>
      <div class="row">
        <span class="muted" id="whoami"></span>
        <button id="logoutBtn" class="btn-sm">خروج</button>
      </div>
    </div>

    <div class="tabs">
      <button data-tab="categories" class="active">فئات لمّة</button>
      <button data-tab="commonfactor">العامل المشترك</button>
      <button data-tab="letters">خانات لعبة الحروف</button>
      <button data-tab="detective">قصة جنائية</button>
      <button data-tab="admins">المشرفين</button>
    </div>

    <div id="msgBox"></div>

    <!-- ===== تبويب: الفئات ===== -->
    <div id="tab-categories" class="tab-panel">
      <div class="card">
        <h2>إضافة قسم جديد</h2>
        <form id="addCategoryForm" class="row">
          <input type="text" id="newCategoryName" placeholder="اسم القسم (مثال: أدوات مكتبية)" required>
          <button type="submit" class="btn-primary">إضافة</button>
        </form>
      </div>
      <div id="categoriesList"></div>
    </div>

    <!-- ===== تبويب: العامل المشترك ===== -->
    <div id="tab-commonfactor" class="tab-panel hidden">
      <div class="card">
        <h2>إضافة سؤال جديد</h2>
        <form id="addQuestionForm">
          <label>المستوى</label>
          <select id="qLevel">
            <option value="1">1 - سهل</option>
            <option value="2">2 - متوسط</option>
            <option value="3">3 - صعب</option>
          </select>
          <label>العناصر (افصل بينها بفاصلة ,)</label>
          <input type="text" id="qItems" placeholder="مثال: تويوتا, لكزس, دايهاتسو" required>
          <label>الخيارات (افصل بينها بفاصلة ,)</label>
          <input type="text" id="qChoices" placeholder="مثال: شركات يابانية, شركات ألمانية" required>
          <label>الإجابة الصحيحة (لازم تكون نفس نص أحد الخيارات بالضبط)</label>
          <input type="text" id="qAnswer" placeholder="مثال: شركات يابانية" required>
          <button type="submit" class="btn-primary">إضافة السؤال</button>
        </form>
      </div>
      <div id="questionsList"></div>
    </div>

    <!-- ===== تبويب: خانات لعبة الحروف ===== -->
    <div id="tab-letters" class="tab-panel hidden">
      <div class="card">
        <h2>إضافة خانة جديدة</h2>
        <form id="addColumnForm">
          <label>المعرف (إنجليزي بدون مسافات، مثال: fruit)</label>
          <input type="text" id="colKey" placeholder="fruit" required>
          <label>الاسم الظاهر</label>
          <input type="text" id="colLabel" placeholder="فاكهة" required>
          <label>إيموجي (اختياري)</label>
          <input type="text" id="colEmoji" placeholder="🍎">
          <div class="row" style="margin-bottom:10px;">
            <input type="checkbox" id="colDefault" style="width:auto;">
            <label style="margin:0;">مفعّلة افتراضياً</label>
          </div>
          <button type="submit" class="btn-primary">إضافة الخانة</button>
        </form>
      </div>
      <div id="columnsList"></div>
    </div>

    <!-- ===== تبويب: قصة جنائية ===== -->
    <div id="tab-detective" class="tab-panel hidden">
      <div class="card">
        <h2>إضافة قضية جديدة</h2>
        <form id="addCaseForm">
          <label>مستوى الصعوبة</label>
          <select id="caseLevel">
            <option value="1">1 - سهل</option>
            <option value="2">2 - متوسط</option>
            <option value="3">3 - صعب</option>
          </select>
          <label>نص القضية</label>
          <textarea id="caseStory" rows="4" placeholder="اكتب تفاصيل القضية والأدلة هنا..." required></textarea>
          <label>الخيارات الأربعة (افصل بينها بفاصلة ,)</label>
          <input type="text" id="caseChoices" placeholder="مثال: الفاعل هو الحارس, لا يوجد فاعل, الفاعل هو الجار, السرقة وهمية" required>
          <label>الإجابة الصحيحة (لازم تكون نفس نص أحد الخيارات بالضبط)</label>
          <input type="text" id="caseAnswer" placeholder="مثال: الفاعل هو الحارس" required>
          <button type="submit" class="btn-primary">إضافة القضية</button>
        </form>
      </div>
      <div id="casesList"></div>
    </div>

    <!-- ===== تبويب: المشرفين ===== -->
    <div id="tab-admins" class="tab-panel hidden">
      <div class="card">
        <h2>إضافة مشرف جديد</h2>
        <form id="addAdminForm">
          <label>اسم المستخدم</label>
          <input type="text" id="newAdminUsername" required>
          <label>كلمة المرور (8 أحرف على الأقل)</label>
          <input type="password" id="newAdminPassword" minlength="8" required>
          <button type="submit" class="btn-primary">إضافة مشرف</button>
        </form>
      </div>
      <div id="adminsList"></div>
    </div>

  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
